<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"="width=device-width, initial-scale=1.0">
    <title>Trail Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pine: #2d4a3e;
            --forest: #4a6b5a;
            --moss: #7b9d7b;
            --sand: #d4b896;
            --sky: #8fb3c7;
            --summit: #f4f1ea;
            --shadow: rgba(45, 74, 62, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--summit);
            color: var(--pine);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 20px, var(--shadow) 20px, var(--shadow) 21px),
                repeating-linear-gradient(90deg, transparent, transparent 20px, var(--shadow) 20px, var(--shadow) 21px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: linear-gradient(135deg, var(--pine) 0%, var(--forest) 100%);
            border-radius: 12px;
            box-shadow: 0 8px 24px var(--shadow);
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.03) 10px,
                rgba(255,255,255,0.03) 20px
            );
            animation: topo 60s linear infinite;
        }
        
        @keyframes topo {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        h1 {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--summit);
            margin-bottom: 8px;
            position: relative;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            color: var(--sand);
            font-size: 0.95em;
            font-family: 'Inconsolata', monospace;
            position: relative;
            opacity: 0.9;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px var(--shadow);
            min-width: 120px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: var(--pine);
            font-family: 'Inconsolata', monospace;
        }
        
        .stat-label {
            font-size: 0.85em;
            color: var(--forest);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 4px;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        input[type="text"], select {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            border: 2px solid var(--moss);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1em;
            background: white;
            color: var(--pine);
            transition: all 0.2s;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--forest);
            box-shadow: 0 0 0 3px rgba(75, 107, 90, 0.1);
        }
        
        button {
            padding: 14px 28px;
            background: var(--forest);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        button:hover {
            background: var(--pine);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--shadow);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--forest) 0%, var(--pine) 100%);
        }
        
        .btn-secondary {
            background: var(--sand);
            color: var(--pine);
        }
        
        .btn-secondary:hover {
            background: #c8a875;
        }
        
        .form-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px var(--shadow);
            margin-bottom: 30px;
            display: none;
        }
        
        .form-section.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--pine);
            font-size: 0.95em;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--moss);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1em;
        }
        
        .checkbox-group {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--forest);
        }
        
        .trail-list {
            display: grid;
            gap: 16px;
        }
        
        .trail-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.2s;
            border-left: 4px solid var(--moss);
        }
        
        .trail-card:hover {
            box-shadow: 0 6px 20px var(--shadow);
            transform: translateY(-2px);
        }
        
        .trail-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }
        
        .trail-name {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--pine);
            margin-bottom: 8px;
        }
        
        .trail-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
        }
        
        .trail-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
            color: var(--forest);
        }
        
        .detail-label {
            font-weight: 600;
            font-family: 'Inconsolata', monospace;
        }
        
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .tag {
            padding: 6px 14px;
            background: var(--moss);
            color: white;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .tag.off-leash {
            background: var(--sky);
        }
        
        .tag.hiking {
            background: var(--sand);
            color: var(--pine);
        }
        
        .tag.biking {
            background: var(--forest);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--forest);
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .stats {
                flex-direction: column;
                gap: 12px;
            }
            
            .stat-card {
                width: 100%;
            }
            
            .trail-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⛰️ Trail Tracker</h1>
            <div class="subtitle">Your Colorado Trail Database</div>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalTrails">0</div>
                <div class="stat-label">Trails</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="offLeashCount">0</div>
                <div class="stat-label">Off-Leash</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="hikingCount">0</div>
                <div class="stat-label">Hiking</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="bikingCount">0</div>
                <div class="stat-label">Biking</div>
            </div>
        </div>
        
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search trails...">
            <select id="filterDirection">
                <option value="">All Directions</option>
                <option value="North">North</option>
                <option value="South">South</option>
                <option value="East">East</option>
                <option value="West">West</option>
                <option value="NE">Northeast</option>
                <option value="NW">Northwest</option>
                <option value="SE">Southeast</option>
                <option value="SW">Southwest</option>
            </select>
            <select id="filterActivity">
                <option value="">All Activities</option>
                <option value="hiking">Hiking</option>
                <option value="biking">Mountain Biking</option>
                <option value="offleash">Off-Leash</option>
            </select>
            <button class="btn-primary" onclick="toggleForm()">+ Add Trail</button>
        </div>
        
        <div class="form-section" id="trailForm">
            <h2 style="margin-bottom: 24px; color: var(--pine);">Add New Trail</h2>
            <form onsubmit="saveTrail(event)">
                <div class="form-group">
                    <label for="trailName">Trail Name *</label>
                    <input type="text" id="trailName" required>
                </div>
                
                <div class="form-group">
                    <label for="distance">Distance from Home (miles) *</label>
                    <input type="number" id="distance" step="0.1" required>
                </div>
                
                <div class="form-group">
                    <label for="direction">Direction from Home *</label>
                    <select id="direction" required>
                        <option value="">Select direction...</option>
                        <option value="North">North</option>
                        <option value="South">South</option>
                        <option value="East">East</option>
                        <option value="West">West</option>
                        <option value="NE">Northeast</option>
                        <option value="NW">Northwest</option>
                        <option value="SE">Southeast</option>
                        <option value="SW">Southwest</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Trail Attributes</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="offLeash">
                            <label for="offLeash" style="margin: 0;">Off-Leash Allowed</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="hiking">
                            <label for="hiking" style="margin: 0;">Hiking</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="biking">
                            <label for="biking" style="margin: 0;">Mountain Biking</label>
                        </div>
                    </div>
                </div>
                
                <div style="display: flex; gap: 12px; margin-top: 30px;">
                    <button type="submit" class="btn-primary">Save Trail</button>
                    <button type="button" class="btn-secondary" onclick="cancelForm()">Cancel</button>
                </div>
            </form>
        </div>
        
        <div class="trail-list" id="trailList"></div>
    </div>
    
    <script>
        let trails = JSON.parse(localStorage.getItem('trails')) || [];
        let editingId = null;
        
        function saveTrail(e) {
            e.preventDefault();
            
            const trail = {
                id: editingId || Date.now(),
                name: document.getElementById('trailName').value,
                distance: parseFloat(document.getElementById('distance').value),
                direction: document.getElementById('direction').value,
                offLeash: document.getElementById('offLeash').checked,
                hiking: document.getElementById('hiking').checked,
                biking: document.getElementById('biking').checked
            };
            
            if (editingId) {
                const index = trails.findIndex(t => t.id === editingId);
                trails[index] = trail;
                editingId = null;
            } else {
                trails.push(trail);
            }
            
            localStorage.setItem('trails', JSON.stringify(trails));
            cancelForm();
            renderTrails();
            updateStats();
        }
        
        function toggleForm() {
            document.getElementById('trailForm').classList.add('active');
            document.getElementById('trailName').focus();
        }
        
        function cancelForm() {
            document.getElementById('trailForm').classList.remove('active');
            document.getElementById('trailForm').querySelector('form').reset();
            editingId = null;
        }
        
        function editTrail(id) {
            const trail = trails.find(t => t.id === id);
            if (!trail) return;
            
            editingId = id;
            document.getElementById('trailName').value = trail.name;
            document.getElementById('distance').value = trail.distance;
            document.getElementById('direction').value = trail.direction;
            document.getElementById('offLeash').checked = trail.offLeash;
            document.getElementById('hiking').checked = trail.hiking;
            document.getElementById('biking').checked = trail.biking;
            
            toggleForm();
        }
        
        function deleteTrail(id) {
            if (confirm('Are you sure you want to delete this trail?')) {
                trails = trails.filter(t => t.id !== id);
                localStorage.setItem('trails', JSON.stringify(trails));
                renderTrails();
                updateStats();
            }
        }
        
        function renderTrails() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const directionFilter = document.getElementById('filterDirection').value;
            const activityFilter = document.getElementById('filterActivity').value;
            
            let filtered = trails.filter(trail => {
                const matchesSearch = trail.name.toLowerCase().includes(searchTerm);
                const matchesDirection = !directionFilter || trail.direction === directionFilter;
                const matchesActivity = !activityFilter || 
                    (activityFilter === 'hiking' && trail.hiking) ||
                    (activityFilter === 'biking' && trail.biking) ||
                    (activityFilter === 'offleash' && trail.offLeash);
                
                return matchesSearch && matchesDirection && matchesActivity;
            });
            
            filtered.sort((a, b) => a.distance - b.distance);
            
            const listContainer = document.getElementById('trailList');
            
            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <p>${trails.length === 0 ? 'No trails yet. Add your first trail!' : 'No trails match your filters.'}</p>
                    </div>
                `;
                return;
            }
            
            listContainer.innerHTML = filtered.map(trail => `
                <div class="trail-card">
                    <div class="trail-header">
                        <div>
                            <div class="trail-name">${trail.name}</div>
                            <div class="tags">
                                ${trail.offLeash ? '<span class="tag off-leash">Off-Leash</span>' : ''}
                                ${trail.hiking ? '<span class="tag hiking">Hiking</span>' : ''}
                                ${trail.biking ? '<span class="tag biking">Mountain Biking</span>' : ''}
                            </div>
                        </div>
                        <div class="trail-actions">
                            <button class="btn-small btn-secondary" onclick="editTrail(${trail.id})">Edit</button>
                            <button class="btn-small" onclick="deleteTrail(${trail.id})" style="background: #c44;">Delete</button>
                        </div>
                    </div>
                    <div class="trail-details">
                        <div class="detail-item">
                            <span class="detail-label">Distance:</span>
                            <span>${trail.distance} mi</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Direction:</span>
                            <span>${trail.direction}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function updateStats() {
            document.getElementById('totalTrails').textContent = trails.length;
            document.getElementById('offLeashCount').textContent = trails.filter(t => t.offLeash).length;
            document.getElementById('hikingCount').textContent = trails.filter(t => t.hiking).length;
            document.getElementById('bikingCount').textContent = trails.filter(t => t.biking).length;
        }
        
        document.getElementById('searchInput').addEventListener('input', renderTrails);
        document.getElementById('filterDirection').addEventListener('change', renderTrails);
        document.getElementById('filterActivity').addEventListener('change', renderTrails);
        
        renderTrails();
        updateStats();
    </script>
</body>
</html>
